name: edoras_member_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  dio: ^5.4.0

  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  path: ^1.9.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/banner/

# ---------------------------
# APP ICON (Adaptive dahil)
# ---------------------------
flutter_launcher_icons:
  android: true
  ios: true

  # iOS ve fallback icon
  image_path: "assets/icons/splash_logo_1024.png"

  # ✅ Android adaptive (yuvarlak + ortalı + büyük)
  adaptive_icon_foreground: "assets/icons/splash_logo_1024.png"
  adaptive_icon_background: "#000000"

  min_sdk_android: 21

# ---------------------------
# NATIVE SPLASH SCREEN
# ---------------------------
flutter_native_splash:
  color: "#000000"
  image: assets/icons/splash_logo_1024.png

  android: true
  ios: true

  android_12:
    color: "#000000"
    image: assets/icons/splash_logo_1024.png